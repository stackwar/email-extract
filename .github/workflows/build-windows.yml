name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name email-extract --hidden-import=easyocr --hidden-import=openpyxl extract.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: email-extract-windows
          path: |
            dist/email-extract.exe
            config.example.json
